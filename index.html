<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Experiment Lab</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.7);
        padding: 10px;
        border-radius: 8px;
    }

    button {
        margin: 2px;
    }
</style>
</head>
<body>

<div id="ui">
    <button onclick="spawnPlanet()">Spawn Planet</button>
    <button onclick="spawnBlackHole()">Spawn Black Hole</button>
    <button onclick="clearBodies()">Clear</button>
    <button onclick="running = !running">Start/Stop</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = true;

const G = 0.2;

class Body {
    constructor(x, y, vx, vy, mass, radius, type) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
        this.color = null;
    }

    draw() {
        ctx.beginPath();

        if (this.type === "star") {
            let grad = ctx.createRadialGradient(
                this.x, this.y, 5,
                this.x, this.y, 80
            );
            grad.addColorStop(0, "white");
            grad.addColorStop(0.3, "yellow");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
        } else if (this.type === "blackhole") {
            ctx.fillStyle = "white";
        } else if (this.type === "planet") {
            ctx.fillStyle = "blue";
        } else {
            ctx.fillStyle = this.color || "gray";
        }

        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

let bodies = [];

// create sun
let sun = new Body(canvas.width / 2, canvas.height / 2, 0, 0, 5000, 20, "star");
bodies.push(sun);

// gravity calculation
function applyGravity(a, b) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) + 0.1;

    let force = (G * a.mass * b.mass) / (dist * dist);

    let fx = force * dx / dist;
    let fy = force * dy / dist;

    a.vx += fx / a.mass;
    a.vy += fy / a.mass;
}

// update physics
function update() {
    for (let i = 0; i < bodies.length; i++) {
        for (let j = 0; j < bodies.length; j++) {
            if (i !== j) applyGravity(bodies[i], bodies[j]);
        }
    }

    bodies.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;
    });
}

// draw everything
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bodies.forEach(b => b.draw());
}

// moons
function createMoon(planet) {
    let distance = 20 + Math.random() * 30;
    let angle = Math.random() * Math.PI * 2;

    let x = planet.x + Math.cos(angle) * distance;
    let y = planet.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * planet.mass / distance);

    let vx = -Math.sin(angle) * speed + planet.vx;
    let vy = Math.cos(angle) * speed + planet.vy;

    return new Body(x, y, vx, vy, 1, 2, "moon");
}

// spawn planet with moons
function spawnPlanet() {
    let center = sun;

    let distance = 120 + Math.random() * 200;
    let angle = Math.random() * Math.PI * 2;

    let x = center.x + Math.cos(angle) * distance;
    let y = center.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * center.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let planet = new Body(x, y, vx, vy, 8, 5, "planet");

    // moons
    let moonCount = Math.floor(Math.random() * 3) + 1;

    for (let i = 0; i < moonCount; i++) {
        let moon = createMoon(planet);
        bodies.push(moon);
    }

    bodies.push(planet);
}

// spawn black hole
function spawnBlackHole() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    let bh = new Body(x, y, 0, 0, 8000, 10, "blackhole");
    bodies.push(bh);
}

// clear everything except sun
function clearBodies() {
    bodies = [sun];
}

// loop
function loop() {
    if (running) update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// resize
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
