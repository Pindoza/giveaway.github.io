<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Lab</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<div id="stars"></div>

<div id="unlockScreen">
    <div id="unlockBox">
        <h2>Enter Access Code</h2>
        <input id="codeInput" placeholder="code">
        <br>
        <button onclick="checkCode()">Unlock</button>
        <p id="status"></p>
    </div>
</div>

<div id="ui">
    <button onclick="spawnPlanet(true)">Planet + Moons</button>
    <button onclick="spawnPlanet(false)">Planet (no moons)</button>
    <button onclick="spawnBlackHole()">Black Hole</button>
    <button onclick="clearBodies()">Clear</button>
    <button onclick="running=!running">Start/Stop</button>
</div>

<canvas id="c"></canvas>

</body>
</html>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = true;
let unlocked = false;

const G = 0.2;

/* -------- STAR BACKGROUND -------- */
function generateStars() {
    const container = document.getElementById("stars");
    for (let i = 0; i < 200; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.opacity = Math.random();
        container.appendChild(star);
    }
}
generateStars();

/* -------- BODY -------- */
class Body {
    constructor(x, y, vx, vy, mass, radius, type) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
    }

    draw() {
        ctx.beginPath();

        if (this.type === "star") {
            let grad = ctx.createRadialGradient(
                this.x, this.y, 5,
                this.x, this.y, 120
            );
            grad.addColorStop(0, "white");
            grad.addColorStop(0.2, "yellow");
            grad.addColorStop(1, "transparent");

            ctx.fillStyle = grad;

            ctx.shadowBlur = 50;
            ctx.shadowColor = "yellow";
        }
        else if (this.type === "blackhole") {
            ctx.fillStyle = "white";
        }
        else if (this.type === "planet") {
            ctx.fillStyle = "blue";
        }
        else {
            ctx.fillStyle = "gray";
        }

        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
    }
}

let bodies = [];

let sun = new Body(canvas.width/2, canvas.height/2, 0, 0, 5000, 20, "star");
bodies.push(sun);

/* -------- GRAVITY -------- */
function applyGravity(a, b) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx + dy*dy) + 0.1;

    let force = (G * a.mass * b.mass) / (dist * dist);

    let fx = force * dx / dist;
    let fy = force * dy / dist;

    a.vx += fx / a.mass;
    a.vy += fy / a.mass;
}

/* -------- MOON -------- */
function createMoon(planet) {
    let distance = 20 + Math.random() * 30;
    let angle = Math.random() * Math.PI * 2;

    let x = planet.x + Math.cos(angle) * distance;
    let y = planet.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * planet.mass / distance);

    let vx = -Math.sin(angle) * speed + planet.vx;
    let vy = Math.cos(angle) * speed + planet.vy;

    return new Body(x, y, vx, vy, 1, 2, "moon");
}

/* -------- PLANET -------- */
function spawnPlanet(withMoons) {
    let distance = 120 + Math.random() * 200;
    let angle = Math.random() * Math.PI * 2;

    let x = sun.x + Math.cos(angle) * distance;
    let y = sun.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * sun.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let planet = new Body(x, y, vx, vy, 8, 5, "planet");

    bodies.push(planet);

    if (withMoons) {
        let moonCount = Math.floor(Math.random()*3)+1;

        for (let i = 0; i < moonCount; i++) {
            let moon = createMoon(planet);
            bodies.push(moon);
        }
    }
}

/* -------- BLACK HOLE -------- */
function spawnBlackHole() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    bodies.push(new Body(x,y,0,0,8000,10,"blackhole"));
}

/* -------- CLEAR -------- */
function clearBodies() {
    bodies = [sun];
}

/* -------- UPDATE -------- */
function update() {
    for (let i=0;i<bodies.length;i++){
        for (let j=0;j<bodies.length;j++){
            if(i!==j) applyGravity(bodies[i], bodies[j]);
        }
    }

    bodies.forEach(b=>{
        b.x += b.vx;
        b.y += b.vy;
    });
}

/* -------- DRAW -------- */
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bodies.forEach(b=>b.draw());
}

/* -------- LOOP -------- */
function loop(){
    if(unlocked && running) update();
    draw();
    requestAnimationFrame(loop);
}
loop();

/* -------- UNLOCK -------- */
async function hashCode(code){
    const encoder = new TextEncoder();
    const data = encoder.encode(code);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");
}

const validHashes = [\
    "1892495595a89843cea0de5ba646cd63b82ba418fb2ac76ab36adc880d2f61ff",
    "0229d07fb8acc463d2f53e227fd5abe94e43d407635c819abaa37d947ac4cf86",
];

async function checkCode(){
    let input = document.getElementById("codeInput").value.trim();

    let hashed = await hashCode(input);

    if(validHashes.includes(hashed)){
        unlocked = true;
        document.getElementById("unlockScreen").style.display="none";
        document.getElementById("ui").style.display="block";
    } else {
        document.getElementById("status").innerText = "Wrong code";
    }
}
</script>

</body>
</html>
