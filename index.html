<!DOCTYPE html>
<html>
<head>
    <title>Secure Unlock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- particles background -->
<div class="particles"></div>

<div class="box">
    <h2 class="glitch" data-text="ACCESS TERMINAL">ACCESS TERMINAL</h2>

    <input type="text" id="codeInput" placeholder="Enter code">
    <button onclick="startHack()">EXECUTE</button>

    <p id="typing"></p>
    <p id="result"></p>
</div>

<!-- sounds -->
<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>
<audio id="success" src="https://www.soundjay.com/misc/success.wav"></audio>

<script>
const validCodes = ["1234", "secret", "unlock"];

// start hacking animation
function startHack() {
    let code = document.getElementById("codeInput").value.toLowerCase();
    let result = document.getElementById("result");
    let typing = document.getElementById("typing");

    result.innerText = "";
    typing.innerText = "";

    typeText("Decrypting files...", typing);
    playBeepLoop();

    setTimeout(() => {
        stopBeep();

        if (validCodes.includes(code)) {
            document.getElementById("success").play();
            typeText("ACCESS GRANTED 😎", result);

            // redirect to game after short delay
            setTimeout(() => {
                window.location.href = "game.html";
            }, 1500);

        } else {
            typeText("ACCESS DENIED 💀", result);
        }
    }, 3000);
}

// typing effect
function typeText(text, element) {
    element.innerText = "";
    let i = 0;

    let interval = setInterval(() => {
        element.innerText += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}

// download (not used here but you can reuse)
function downloadFile(path) {
    window.location.href = path;
}

// beep loop
let beepInterval;

function playBeepLoop() {
    let beep = document.getElementById("beep");
    beepInterval = setInterval(() => {
        beep.currentTime = 0;
        beep.play();
    }, 200);
}

function stopBeep() {
    clearInterval(beepInterval);
}

// particle generator
function createParticles() {
    const container = document.querySelector(".particles");

    for (let i = 0; i < 40; i++) {
        let p = document.createElement("div");
        p.className = "particle";

        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (5 + Math.random() * 10) + "s";
        p.style.opacity = Math.random();

        container.appendChild(p);
    }
}

createParticles();
</script>

</body>
</html>
