<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Experiment Lab</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: white;
        font-family: Arial;
    }

    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(0,0,0,0.7);
        padding: 10px;
        border-radius: 8px;
        display: none;
    }

    #unlockScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    input {
        padding: 10px;
        font-size: 16px;
        margin: 5px;
    }

    button {
        padding: 10px;
        margin: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="unlockScreen">
    <h2>Enter Access Code</h2>
    <input id="codeInput" type="text" placeholder="Enter code">
    <button onclick="checkCode()">Unlock</button>
    <p id="status"></p>
</div>

<div id="ui">
    <button onclick="spawnPlanet()">Spawn Planet</button>
    <button onclick="spawnBlackHole()">Spawn Black Hole</button>
    <button onclick="clearBodies()">Clear</button>
    <button onclick="running = !running">Start/Stop</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = true;
let unlocked = false;

const G = 0.2;

class Body {
    constructor(x, y, vx, vy, mass, radius, type) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
    }

    draw() {
        ctx.beginPath();

        if (this.type === "star") {
            let grad = ctx.createRadialGradient(
                this.x, this.y, 5,
                this.x, this.y, 80
            );
            grad.addColorStop(0, "white");
            grad.addColorStop(0.3, "yellow");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
        } else if (this.type === "blackhole") {
            ctx.fillStyle = "white";
        } else if (this.type === "planet") {
            ctx.fillStyle = "blue";
        } else {
            ctx.fillStyle = "gray";
        }

        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

let bodies = [];

let sun = new Body(canvas.width / 2, canvas.height / 2, 0, 0, 5000, 20, "star");
bodies.push(sun);

// gravity
function applyGravity(a, b) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx * dx + dy * dy) + 0.1;

    let force = (G * a.mass * b.mass) / (dist * dist);

    let fx = force * dx / dist;
    let fy = force * dy / dist;

    a.vx += fx / a.mass;
    a.vy += fy / a.mass;
}

// update
function update() {
    for (let i = 0; i < bodies.length; i++) {
        for (let j = 0; j < bodies.length; j++) {
            if (i !== j) applyGravity(bodies[i], bodies[j]);
        }
    }

    bodies.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;
    });
}

// draw
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    bodies.forEach(b => b.draw());
}

// moons
function createMoon(planet) {
    let distance = 20 + Math.random() * 30;
    let angle = Math.random() * Math.PI * 2;

    let x = planet.x + Math.cos(angle) * distance;
    let y = planet.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * planet.mass / distance);

    let vx = -Math.sin(angle) * speed + planet.vx;
    let vy = Math.cos(angle) * speed + planet.vy;

    return new Body(x, y, vx, vy, 1, 2, "moon");
}

// spawn planet
function spawnPlanet() {
    let distance = 120 + Math.random() * 200;
    let angle = Math.random() * Math.PI * 2;

    let x = sun.x + Math.cos(angle) * distance;
    let y = sun.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * sun.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let planet = new Body(x, y, vx, vy, 8, 5, "planet");

    let moonCount = Math.floor(Math.random() * 3) + 1;

    for (let i = 0; i < moonCount; i++) {
        let moon = createMoon(planet);
        bodies.push(moon);
    }

    bodies.push(planet);
}

// black hole
function spawnBlackHole() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    let bh = new Body(x, y, 0, 0, 8000, 10, "blackhole");
    bodies.push(bh);
}

// clear
function clearBodies() {
    bodies = [sun];
}

// loop
function loop() {
    if (unlocked && running) update();
    draw();
    requestAnimationFrame(loop);
}

loop();

// ------------------- UNLOCK SYSTEM -------------------

// pre-hashed valid codes (SHA-256)
const validHashes = [
    "51e28bf8ab2cae86c9a1afb527029950138fac1c696b7335906d7792c94f3e2f",
    "1892495595a89843cea0de5ba646cd63b82ba418fb2ac76ab36adc880d2f61ff",
];

// NOTE: Replace above with real hashes of your codes

async function hashCode(code) {
    const encoder = new TextEncoder();
    const data = encoder.encode(code);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function checkCode() {
    const input = document.getElementById("codeInput").value;
    const status = document.getElementById("status");

    const hashed = await hashCode(input);

    if (validHashes.includes(hashed)) {
        unlocked = true;
        document.getElementById("unlockScreen").style.display = "none";
        document.getElementById("ui").style.display = "block";
    } else {
        status.innerText = "Invalid code";
    }
}

</script>

</body>
</html>
