<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Lab</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="stars"></div>

<div id="unlockScreen">
    <div id="unlockBox">
        <h2>Enter Access Code</h2>
        <input id="codeInput" placeholder="code">
        <br><br>
        <button onclick="checkCode()">Unlock</button>
        <p id="status"></p>
    </div>
</div>

<div id="ui">
    <button onclick="spawnPlanet(true)">Planet + Moons</button>
    <button onclick="spawnPlanet(false)">Planet (no moons)</button>
    <button onclick="spawnBlackHole()">Black Hole</button>
    <button onclick="clearBodies()">Clear</button>
    <button onclick="running=!running">Start/Stop</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = true;
let unlocked = false;

const G = 0.2;

/* -------- STARS -------- */
function generateStars() {
    const container = document.getElementById("stars");
    for (let i = 0; i < 200; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.opacity = Math.random();
        container.appendChild(star);
    }
}
generateStars();

/* -------- BODY -------- */
class Body {
    constructor(x, y, vx, vy, mass, radius, type) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
    }

    draw() {
        ctx.beginPath();

        if (this.type === "star") {
            let grad = ctx.createRadialGradient(
                this.x, this.y, 5,
                this.x, this.y, 120
            );
            grad.addColorStop(0, "white");
            grad.addColorStop(0.2, "yellow");
            grad.addColorStop(1, "transparent");

            ctx.fillStyle = grad;
            ctx.shadowBlur = 50;
            ctx.shadowColor = "yellow";
        }
        else if (this.type === "blackhole") {
            ctx.fillStyle = "white";
        }
        else if (this.type === "planet") {
            ctx.fillStyle = "blue";
        }
        else {
            ctx.fillStyle = "gray";
        }

        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

let bodies = [];

let sun = new Body(canvas.width/2, canvas.height/2, 0, 0, 5000, 20, "star");
bodies.push(sun);

/* -------- GRAVITY -------- */
function applyGravity(a, b) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx + dy*dy) + 0.1;

    let force = (G * a.mass * b.mass) / (dist * dist);

    let fx = force * dx / dist;
    let fy = force * dy / dist;

    a.vx += fx / a.mass;
    a.vy += fy / a.mass;
}

/* -------- MOON -------- */
function createMoon(planet) {
    let distance = 20 + Math.random() * 30;
    let angle = Math.random() * Math.PI * 2;

    let x = planet.x + Math.cos(angle) * distance;
    let y = planet.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * planet.mass / distance);

    let vx = -Math.sin(angle) * speed + planet.vx;
    let vy = Math.cos(angle) * speed + planet.vy;

    return new Body(x, y, vx, vy, 1, 2, "moon");
}

/* -------- PLANET -------- */
function spawnPlanet(withMoons) {
    let distance = 120 + Math.random() * 200;
    let angle = Math.random() * Math.PI * 2;

    let x = sun.x + Math.cos(angle) * distance;
    let y = sun.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * sun.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let planet = new Body(x, y, vx, vy, 8, 5, "planet");
    bodies.push(planet);

    if (withMoons) {
        let moonCount = Math.floor(Math.random()*3)+1;
        for (let i = 0; i < moonCount; i++) {
            bodies.push(createMoon(planet));
        }
    }
}

/* -------- BLACK HOLE -------- */
function spawnBlackHole() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    bodies.push(new Body(x,y,0,0,8000,10,"blackhole"));
}

/* -------- CLEAR -------- */
function clearBodies() {
    bodies = [sun];
}

/* -------- UPDATE -------- */
function update() {
    for (let i=0;i<bodies.length;i++){
        for (let j=0;j<bodies.length;j++){
            if(i!==j) applyGravity(bodies[i], bodies[j]);
        }
    }

    bodies.forEach(b=>{
        b.x += b.vx;
        b.y += b.vy;
    });
}

/* -------- DRAW -------- */
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bodies.forEach(b=>b.draw());
}

/* -------- LOOP -------- */
function loop(){
    if(unlocked && running) update();
    draw();
    requestAnimationFrame(loop);
}
loop();

/* -------- UNLOCK SYSTEM -------- */
async function hashCode(code){
    const encoder = new TextEncoder();
    const data = encoder.encode(code);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* PUT YOUR VALID HASHES HERE */
const validHashes = [\
    "1892495595a89843cea0de5ba646cd63b82ba418fb2ac76ab36adc880d2f61ff",
    "0229d07fb8acc463d2f53e227fd5abe94e43d407635c819abaa37d947ac4cf86",
];


async function checkCode(){
    let input = document.getElementById("codeInput").value.trim();
    let hashed = await hashCode(input);

    console.log("Input:", input);
    console.log("Hash:", hashed);

    if(validHashes.includes(hashed)){
        unlocked = true;
        document.getElementById("unlockScreen").style.display="none";
        document.getElementById("ui").style.display="block";
        document.getElementById("status").innerText = "Unlocked!";
    } else {
        document.getElementById("status").innerText = "Wrong code";
    }
}
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gravity Lab</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="stars"></div>

<div id="unlockScreen">
    <div id="unlockBox">
        <h2>Enter Access Code</h2>
        <input id="codeInput" placeholder="code">
        <br><br>
        <button type="button" onclick="checkCode()">Unlock</button>
        <p id="status"></p>
    </div>
</div>

<div id="ui">
    <div class="panelTitle">Solar Controls</div>

    <div class="controlRow buttons">
        <button type="button" onclick="openPlanetPicker(true)">Planet + Moons</button>
        <button type="button" onclick="openPlanetPicker(false)">Planet (no moons)</button>
        <button type="button" onclick="spawnAllPlanets()">Spawn Full Solar Set</button>
    </div>

    <div class="controlRow buttons">
        <button type="button" onclick="spawnBlackHole()">Black Hole</button>
        <button type="button" onclick="clearBodies()">Clear</button>
        <button type="button" onclick="running=!running">Start/Stop</button>
    </div>
</div>

<div id="planetPicker" class="hidden">
    <div id="planetPickerBox">
        <h3>Select a planet</h3>
        <p id="pickerMode"></p>
        <div class="planetGrid">
            <button type="button" onclick="choosePlanet('mercury')">Mercury</button>
            <button type="button" onclick="choosePlanet('venus')">Venus</button>
            <button type="button" onclick="choosePlanet('earth')">Earth</button>
            <button type="button" onclick="choosePlanet('mars')">Mars</button>
            <button type="button" onclick="choosePlanet('jupiter')">Jupiter</button>
            <button type="button" onclick="choosePlanet('saturn')">Saturn</button>
            <button type="button" onclick="choosePlanet('uranus')">Uranus</button>
            <button type="button" onclick="choosePlanet('neptune')">Neptune</button>
        </div>
        <button type="button" onclick="closePlanetPicker()">Cancel</button>
    </div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let running = true;
let unlocked = false;
let pendingPlanetSpawnWithMoons = false;

const G = 0.2;

const PLANET_MODELS = {
    mercury: { name: "Mercury", mass: 2.6, radius: 3, orbitalDistance: 90, color: "#9ca3af", accent: "#6b7280", moons: 0 },
    venus: { name: "Venus", mass: 4.8, radius: 4.5, orbitalDistance: 130, color: "#eab308", accent: "#f59e0b", moons: 0 },
    earth: { name: "Earth", mass: 8, radius: 5, orbitalDistance: 170, color: "#2563eb", accent: "#16a34a", moons: 1 },
    mars: { name: "Mars", mass: 4.2, radius: 4, orbitalDistance: 210, color: "#ef4444", accent: "#b91c1c", moons: 2 },
    jupiter: { name: "Jupiter", mass: 35, radius: 11, orbitalDistance: 270, color: "#d6a45f", accent: "#92400e", moons: 4 },
    saturn: { name: "Saturn", mass: 29, radius: 10, orbitalDistance: 330, color: "#f5deb3", accent: "#ca8a04", moons: 4, ring: true },
    uranus: { name: "Uranus", mass: 17, radius: 8, orbitalDistance: 390, color: "#67e8f9", accent: "#0ea5e9", moons: 3 },
    neptune: { name: "Neptune", mass: 18, radius: 8, orbitalDistance: 450, color: "#1d4ed8", accent: "#1e3a8a", moons: 3 }
};

/* -------- STARS -------- */
function generateStars() {
    const container = document.getElementById("stars");
    for (let i = 0; i < 200; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "%";
        star.style.top = Math.random() * 100 + "%";
        star.style.opacity = Math.random();
        container.appendChild(star);
    }
}
generateStars();

const unlockLayers = document.querySelectorAll("#unlockScreen");
if (unlockLayers.length > 1) {
    unlockLayers.forEach((layer, index) => {
        if (index > 0) layer.remove();
    });
}

/* -------- BODY -------- */
class Body {
    constructor(x, y, vx, vy, mass, radius, type, name = "", model = null, parent = null) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
        this.name = name;
        this.model = model;
        this.parent = parent;
    }

    draw() {
        if (this.type === "star") {
            ctx.beginPath();
            let grad = ctx.createRadialGradient(
                this.x, this.y, 5,
                this.x, this.y, 120
            );
            grad.addColorStop(0, "white");
            grad.addColorStop(0.2, "yellow");
            grad.addColorStop(1, "transparent");

            ctx.fillStyle = grad;
            ctx.shadowBlur = 120;
            ctx.shadowColor = "#fff59d";
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        else if (this.type === "blackhole") {
            ctx.beginPath();
            ctx.fillStyle = "white";
            ctx.shadowBlur = 80;
            ctx.shadowColor = "rgba(255,255,255,0.9)";
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        else if (this.type === "planet") {
            this.drawPlanetModel();
        }
        else {
            ctx.beginPath();
            ctx.fillStyle = "#9ca3af";
            ctx.shadowBlur = 16;
            ctx.shadowColor = "rgba(226,232,240,0.75)";
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        this.drawLabel();
    }

    drawPlanetModel() {
        const primary = this.model?.color || "blue";
        const accent = this.model?.accent || "#ffffff";

        ctx.beginPath();
        const planetGradient = ctx.createRadialGradient(
            this.x - this.radius * 0.3,
            this.y - this.radius * 0.35,
            Math.max(1, this.radius * 0.2),
            this.x,
            this.y,
            this.radius * 1.2
        );
        planetGradient.addColorStop(0, "#ffffff");
        planetGradient.addColorStop(0.2, primary);
        planetGradient.addColorStop(1, accent);

        ctx.fillStyle = planetGradient;
        ctx.shadowBlur = Math.max(20, this.radius * 4);
        ctx.shadowColor = primary;
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (this.model?.ring) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(245, 222, 179, 0.8)";
            ctx.lineWidth = 2;
            ctx.ellipse(this.x, this.y, this.radius * 1.8, this.radius * 0.7, Math.PI / 8, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    drawLabel() {
        if (!this.name) return;
        ctx.font = "12px Arial";
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.textAlign = "center";
        ctx.fillText(this.name, this.x, this.y - this.radius - 8);
    }
}

let bodies = [];

let sun = new Body(canvas.width/2, canvas.height/2, 0, 0, 5000, 20, "star", "Sun");
bodies.push(sun);

/* -------- GRAVITY -------- */
function applyGravity(a, b) {
    let dx = b.x - a.x;
    let dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx + dy*dy) + 0.1;

    let force = (G * a.mass * b.mass) / (dist * dist);

    let fx = force * dx / dist;
    let fy = force * dy / dist;

    a.vx += fx / a.mass;
    a.vy += fy / a.mass;
}

/* -------- MOON -------- */
function createMoon(planet, index = 1) {
    let distance = 10 + Math.random() * 12;
    let angle = Math.random() * Math.PI * 2;

    let x = planet.x + Math.cos(angle) * distance;
    let y = planet.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * planet.mass / distance);

    let vx = -Math.sin(angle) * speed + planet.vx;
    let vy = Math.cos(angle) * speed + planet.vy;

    return new Body(x, y, vx, vy, 1.8, 2.4, "moon", `${planet.name} Moon ${index}`, null, planet);
}

/* -------- PLANET -------- */
function spawnPlanet(withMoons, planetKey = "earth") {
    if (!sun || !bodies.includes(sun)) return;

    const model = PLANET_MODELS[planetKey] || PLANET_MODELS.earth;

    let distance = model.orbitalDistance + (Math.random() * 20 - 10);
    let angle = Math.random() * Math.PI * 2;

    let x = sun.x + Math.cos(angle) * distance;
    let y = sun.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * sun.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let planet = new Body(x, y, vx, vy, model.mass, model.radius, "planet", model.name, model);
    bodies.push(planet);

    if (withMoons) {
        let moonCount = Math.max(1, model.moons);
        for (let i = 0; i < moonCount; i++) {
            bodies.push(createMoon(planet, i + 1));
        }
    }
}

function openPlanetPicker(withMoons) {
    pendingPlanetSpawnWithMoons = withMoons;
    document.getElementById("pickerMode").innerText = withMoons
        ? "Mode: Planet + moons"
        : "Mode: Planet without moons";
    document.getElementById("planetPicker").classList.remove("hidden");
}

function closePlanetPicker() {
    document.getElementById("planetPicker").classList.add("hidden");
}

function choosePlanet(planetKey) {
    spawnPlanet(pendingPlanetSpawnWithMoons, planetKey);
    closePlanetPicker();
}

function spawnAllPlanets() {
    if (!sun || !bodies.includes(sun)) return;
    Object.keys(PLANET_MODELS).forEach((planetKey) => {
        spawnPlanet(true, planetKey);
    });
}

/* -------- BLACK HOLE -------- */
function spawnBlackHole() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    bodies.push(new Body(x,y,0,0,8000,10,"blackhole", "Black Hole"));
}

/* -------- CLEAR -------- */
function clearBodies() {
    bodies = sun && bodies.includes(sun) ? [sun] : [];
}

/* -------- UPDATE -------- */
function update() {
    for (let i=0;i<bodies.length;i++){
        for (let j=0;j<bodies.length;j++){
            if(i!==j) applyGravity(bodies[i], bodies[j]);
        }
    }

    for (const body of bodies) {
        if (body.type === "moon" && body.parent) {
            const dx = body.parent.x - body.x;
            const dy = body.parent.y - body.y;
            const dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
            const lockForce = (G * body.parent.mass * body.mass * 2.5) / (dist * dist);
            body.vx += (lockForce * dx / dist) / body.mass;
            body.vy += (lockForce * dy / dist) / body.mass;
        }
    }

    handleBlackHoleFeeding();

    bodies.forEach(b=>{
        b.x += b.vx;
        b.y += b.vy;
    });
}

function handleBlackHoleFeeding() {
    const blackHoles = bodies.filter((b) => b.type === "blackhole");
    if (!blackHoles.length) return;

    blackHoles.forEach((blackHole) => {
        for (let i = bodies.length - 1; i >= 0; i--) {
            const target = bodies[i];
            if (target === blackHole || target.type === "blackhole") continue;

            const dx = blackHole.x - target.x;
            const dy = blackHole.y - target.y;
            const dist = Math.sqrt(dx * dx + dy * dy) + 0.1;
            const influenceRadius = blackHole.radius * 9;
            if (dist > influenceRadius) continue;

            const baseDrain = Math.max(0.01, blackHole.mass * 0.00004);
            const proximityBoost = Math.max(1, influenceRadius / dist);
            const drain = Math.min(target.mass * 0.03, baseDrain * proximityBoost);
            target.mass -= drain;
            blackHole.mass += drain * 0.92;

            target.radius = Math.max(0.8, Math.sqrt(Math.max(target.mass, 0.1)));
            blackHole.radius = Math.min(140, Math.sqrt(blackHole.mass) * 0.11);

            if (target.mass <= 0.8 || target.radius <= 1) {
                if (target === sun) {
                    sun = null;
                }
                bodies.splice(i, 1);
            }
        }
    });
}

/* -------- DRAW -------- */
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bodies.forEach(b=>b.draw());
}

/* -------- LOOP -------- */
function loop(){
    if(unlocked && running) update();
    draw();
    requestAnimationFrame(loop);
}
loop();

/* -------- UNLOCK SYSTEM -------- */
async function hashCode(code){
    const encoder = new TextEncoder();
    const data = encoder.encode(code);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* PUT YOUR VALID HASHES HERE */
const validHashes = [
    "1892495595a89843cea0de5ba646cd63b82ba418fb2ac76ab36adc880d2f61ff",
    "0229d07fb8acc463d2f53e227fd5abe94e43d407635c819abaa37d947ac4cf86",
];


async function checkCode(){
    if (unlocked) return;

    let input = document.getElementById("codeInput").value.trim();
    if (!input) {
        document.getElementById("status").innerText = "Please enter a code";
        return;
    }

    const candidateInputs = [input, input.toLowerCase(), input.toUpperCase()];
    const hashes = await Promise.all(candidateInputs.map(hashCode));

    console.log("Input:", input);
    console.log("Hash candidates:", hashes);

    if(hashes.some((hashed) => validHashes.includes(hashed))){
        unlocked = true;
        document.getElementById("unlockScreen").style.display="none";
        document.getElementById("ui").style.display="block";
        document.getElementById("status").innerText = "Unlocked!";
    } else {
        document.getElementById("status").innerText = "Wrong code";
    }
}
</script>

</body>
</html>
