<!DOCTYPE html>
<html>
<head>
    <title>Solar System Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: Arial;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
        }

        button {
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <button onclick="spawnPlanet()">Spawn Planet</button>
    <button onclick="spawnBlackHole()">Spawn Black Hole</button>
    <button onclick="resetSim()">Reset</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const G = 0.05; // gravitational constant (tunable)

let bodies = [];

// central star
bodies.push({
    x: canvas.width / 2,
    y: canvas.height / 2,
    vx: 0,
    vy: 0,
    mass: 20000,
    radius: 20,
    type: "star"
});

class Body {
    constructor(x, y, vx, vy, mass, radius, type) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
    }

    update() {
        let ax = 0;
        let ay = 0;

        for (let other of bodies) {
            if (other === this) continue;

            let dx = other.x - this.x;
            let dy = other.y - this.y;

            let distSq = dx * dx + dy * dy;
            let dist = Math.sqrt(distSq) || 1;

            // gravitational force
            let force = (G * this.mass * other.mass) / distSq;

            // acceleration
            ax += (force * dx / dist) / this.mass;
            ay += (force * dy / dist) / this.mass;

            // collision / absorption
            if (dist < this.radius + other.radius) {
                if (other.type === "blackhole" && this.type !== "blackhole") {
                    // absorbed by black hole
                    this.mass = 0;
                }
            }
        }

        this.vx += ax;
        this.vy += ay;

        this.x += this.vx;
        this.y += this.vy;
    }

    draw() {
        ctx.beginPath();

        if (this.type === "star") {
            ctx.fillStyle = "yellow";
        } else if (this.type === "blackhole") {
            ctx.fillStyle = "white";
        } else {
            ctx.fillStyle = "cyan";
        }

        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

function spawnPlanet() {
    let center = bodies[0];

    let distance = 100 + Math.random() * 200;
    let angle = Math.random() * Math.PI * 2;

    let x = center.x + Math.cos(angle) * distance;
    let y = center.y + Math.sin(angle) * distance;

    // orbital velocity approximation
    let speed = Math.sqrt(G * center.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let mass = 5 + Math.random() * 10;

    bodies.push(new Body(x, y, vx, vy, mass, 4, "planet"));
}

function spawnBlackHole() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height;

    bodies.push(new Body(x, y, 0, 0, 50000, 8, "blackhole"));
}

function resetSim() {
    bodies = [];

    bodies.push({
        x: canvas.width / 2,
        y: canvas.height / 2,
        vx: 0,
        vy: 0,
        mass: 20000,
        radius: 20,
        type: "star"
    });
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let b of bodies) {
        if (b.mass === 0) continue;

        if (b instanceof Body) {
            b.update();
        }
        if (b.draw) b.draw();
    }

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
