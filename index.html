<!DOCTYPE html>
<html>
<head>
    <title>Unlock Downloads</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <h2>🔐 Enter Code</h2>
    <input type="text" id="codeInput" placeholder="Type code here">
    <button onclick="checkCode()">Submit</button>

    <p id="result"></p>

    <div id="downloads" style="display:none; margin-top:20px;">
        <h3>📦 Available Downloads:</h3>

        <div class="item">
            <span>🎮 Game Files</span>
            <button onclick="downloadFile('files/game.zip')">Download</button>
        </div>

        <div class="item">
            <span>🖼 Secret Image</span>
            <button onclick="downloadFile('files/image.png')">Download</button>
        </div>

        <div class="item">
            <span>🎵 Music Pack</span>
            <button onclick="downloadFile('files/music.mp3')">Download</button>
        </div>

    </div>
</div>

<script>
const validCodes = ["1234", "secret", "unlock"];

function checkCode() {
    let code = document.getElementById("codeInput").value;
    let result = document.getElementById("result");
    let downloads = document.getElementById("downloads");

    if (validCodes.includes(code)) {
        result.innerText = "ACCESS GRANTED 😎";
        result.style.color = "green";
        downloads.style.display = "block";
    } else {
        result.innerText = "WRONG CODE 💀";
        result.style.color = "red";
        downloads.style.display = "none";
    }
}

function downloadFile(path) {
    window.location.href = path;
}
</script>

</body>
</html>
