<!DOCTYPE html>
<html>
<head>
    <title>Solar System with Shader Sun</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            color: white;
            font-family: Arial;
        }

        button {
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<canvas id="glCanvas"></canvas>
<canvas id="simCanvas"></canvas>

<div id="ui">
    <button onclick="spawnPlanet()">Spawn Planet</button>
    <button onclick="spawnBlackHole()">Spawn Black Hole</button>
    <button onclick="resetSim()">Reset</button>
</div>

<script>
/* =========================
   WEBGL SUN (SHADER)
========================= */

const glCanvas = document.getElementById("glCanvas");
const gl = glCanvas.getContext("webgl");

glCanvas.width = window.innerWidth;
glCanvas.height = window.innerHeight;

const vertexShaderSource = `
attribute vec2 position;
void main() {
    gl_Position = vec4(position, 0.0, 1.0);
}
`;

const fragmentShaderSource = `
precision mediump float;
uniform float time;
uniform vec2 resolution;

void main() {
    vec2 uv = gl_FragCoord.xy / resolution.xy;
    vec2 center = vec2(0.5, 0.5);

    float dist = distance(uv, center);

    float glow = 0.02 / dist;

    float pulse = sin(time * 2.0) * 0.1;

    vec3 color = vec3(1.0, 0.6, 0.1) * glow;
    color += vec3(1.0, 0.3, 0.0) * pulse;

    gl_FragColor = vec4(color, 1.0);
}
`;

function createShader(type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
}

const vertexShader = createShader(gl.VERTEX_SHADER, vertexShaderSource);
const fragmentShader = createShader(gl.FRAGMENT_SHADER, fragmentShaderSource);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

const vertices = new Float32Array([
    -1, -1,
     1, -1,
    -1,  1,
     1,  1
]);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

const position = gl.getAttribLocation(program, "position");
gl.enableVertexAttribArray(position);
gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

const timeUniform = gl.getUniformLocation(program, "time");
const resolutionUniform = gl.getUniformLocation(program, "resolution");

function renderSun(time) {
    gl.viewport(0, 0, glCanvas.width, glCanvas.height);
    gl.uniform1f(timeUniform, time * 0.001);
    gl.uniform2f(resolutionUniform, glCanvas.width, glCanvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

/* =========================
   PHYSICS SIMULATION
========================= */

const simCanvas = document.getElementById("simCanvas");
const ctx = simCanvas.getContext("2d");

simCanvas.width = window.innerWidth;
simCanvas.height = window.innerHeight;

const G = 0.05;
let bodies = [];

// sun (physics body at center)
bodies.push({
    x: simCanvas.width / 2,
    y: simCanvas.height / 2,
    vx: 0,
    vy: 0,
    mass: 20000,
    radius: 20,
    type: "star"
});

class Body {
    constructor(x, y, vx, vy, mass, radius, type) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.mass = mass;
        this.radius = radius;
        this.type = type;
    }

    update() {
        let ax = 0;
        let ay = 0;

        for (let other of bodies) {
            if (other === this) continue;

            let dx = other.x - this.x;
            let dy = other.y - this.y;

            let distSq = dx * dx + dy * dy;
            let dist = Math.sqrt(distSq) || 1;

            let force = (G * this.mass * other.mass) / distSq;

            ax += (force * dx / dist) / this.mass;
            ay += (force * dy / dist) / this.mass;
        }

        this.vx += ax;
        this.vy += ay;

        this.x += this.vx;
        this.y += this.vy;
    }

    draw() {
    ctx.beginPath();

    if (this.type === "star") {
        ctx.fillStyle = "yellow";
    } else if (this.type === "blackhole") {
        ctx.fillStyle = "white";
    } else {
        ctx.fillStyle = this.color || "cyan";
    }

    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
}
}

function getRandomColor() {
    return `hsl(${Math.random() * 360}, 80%, 60%)`;
}

function spawnPlanet() {
    let center = bodies[0];

    let distance = 120 + Math.random() * 200;
    let angle = Math.random() * Math.PI * 2;

    let x = center.x + Math.cos(angle) * distance;
    let y = center.y + Math.sin(angle) * distance;

    let speed = Math.sqrt(G * center.mass / distance);

    let vx = -Math.sin(angle) * speed;
    let vy = Math.cos(angle) * speed;

    let planet = new Body(x, y, vx, vy, 8, 4, "planet");
    planet.color = getRandomColor();

    bodies.push(planet);
}

function spawnBlackHole() {
    bodies.push(
        new Body(
            Math.random() * simCanvas.width,
            Math.random() * simCanvas.height,
            0,
            0,
            50000,
            8,
            "blackhole"
        )
    );
}

function resetSim() {
    bodies = [];
    bodies.push({
        x: simCanvas.width / 2,
        y: simCanvas.height / 2,
        vx: 0,
        vy: 0,
        mass: 20000,
        radius: 20,
        type: "star"
    });
}

/* =========================
   LOOP
========================= */

function animate(time) {
    renderSun(time);

    ctx.clearRect(0, 0, simCanvas.width, simCanvas.height);

    for (let b of bodies) {
        if (b instanceof Body) {
            b.update();
            b.draw();
        }
    }

    requestAnimationFrame(animate);
}

animate(0);

window.addEventListener("resize", () => {
    glCanvas.width = window.innerWidth;
    glCanvas.height = window.innerHeight;
    simCanvas.width = window.innerWidth;
    simCanvas.height = window.innerHeight;
});
</script>

</body>
</html>
