<!DOCTYPE html>
<html>
<head>
    <title>Experiment Lab</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            overflow: hidden;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            width: 240px;
        }

        input, button {
            width: 100%;
            margin-top: 8px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<div id="ui">
    <label>Gravity</label>
    <input type="range" id="gravity" min="0" max="1" step="0.01" value="0.2">

    <label>Particle Size</label>
    <input type="range" id="size" min="2" max="12" value="5">

    <label>Particle Count</label>
    <input type="number" id="count" value="50">

    <label>Color</label>
    <input type="color" id="color" value="#00ffcc">

    <button onclick="spawnParticles()">Spawn Particles</button>
    <button onclick="clearParticles()">Reset</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

const gravitySlider = document.getElementById("gravity");
const sizeSlider = document.getElementById("size");
const countInput = document.getElementById("count");
const colorPicker = document.getElementById("color");

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;

        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 0.5) * 6;

        this.size = parseInt(sizeSlider.value);
        this.color = colorPicker.value;
    }

    update() {
        this.vy += parseFloat(gravitySlider.value);

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

function spawnParticles() {
    let count = parseInt(countInput.value);

    for (let i = 0; i < count; i++) {
        let x = canvas.width / 2;
        let y = canvas.height / 2;
        particles.push(new Particle(x, y));
    }
}

function clearParticles() {
    particles = [];
}

// initial spawn
spawnParticles();

function animate() {
    ctx.fillStyle = "rgba(15, 23, 42, 0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
